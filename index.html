```html
<!-- STEP4 エステレラ登録用 -->

<div class="notice danger">
  <div style="font-size:20px;font-weight:900;">
    🚨 エステレラ登録前にご確認ください
  </div>

  <p style="color:#c00000;font-weight:900;font-size:18px;">
    紹介者から登録URLを受け取ってください
  </p>

  <p>
    または紹介者の6桁IDを入力してください。
  </p>

  <div style="margin:20px 0;">

    <div style="font-weight:bold;margin-bottom:8px;">
      登録URL
    </div>

    <div style="
      display:flex;
      align-items:center;
      border:2px solid #d8b76a;
      border-radius:12px;
      overflow:hidden;
      max-width:600px;
      background:#fff;
    ">

      <span style="
        background:#f5f5f5;
        padding:12px;
        white-space:nowrap;
        font-size:14px;
      ">
        https://member.estlela.jp/
      </span>

      <input
        type="tel"
        id="memberId"
        maxlength="6"
        placeholder="282500"
        style="
          border:none;
          flex:1;
          padding:12px;
          font-size:18px;
          outline:none;
        "
      >
    </div>

    <button
      onclick="createUrl()"
      style="
        margin-top:15px;
        padding:12px 24px;
        background:#d8b76a;
        border:none;
        border-radius:999px;
        font-weight:bold;
        cursor:pointer;
      ">
      URL作成
    </button>

    <div id="result"></div>

  </div>

  <p style="font-size:12px;">
    紹介者がいない場合のみ下記をご利用ください
  </p>

  <a
    href="https://member.estlela.jp/282500"
    style="
      display:inline-block;
      padding:8px 14px;
      font-size:12px;
      background:#ddd;
      color:#333;
      border-radius:999px;
      text-decoration:none;
    ">
    紹介者がいない場合はこちら
  </a>
</div>

<script>
function createUrl() {

  const id =
    document
      .getElementById("memberId")
      .value
      .replace(/\D/g,'');

  if(id.length !== 6){
    alert("6桁の数字を入力してください");
    return;
  }

  const url =
    "https://member.estlela.jp/" + id;

  document.getElementById("result").innerHTML = `
    <div style="
      margin-top:20px;
      padding:15px;
      border:1px solid #d8b76a;
      border-radius:12px;
      background:#faf8f2;
    ">

      <p style="font-weight:bold;">
        登録URLが作成されました
      </p>

      <a
        href="${url}"
        target="_blank"
        style="
          display:inline-block;
          padding:12px 24px;
          background:#d8b76a;
          color:#000;
          border-radius:999px;
          text-decoration:none;
          font-weight:bold;
        ">
        登録ページへ進む
      </a>

      <p style="
        margin-top:10px;
        font-size:12px;
        word-break:break-all;
      ">
        ${url}
      </p>

    </div>
  `;
}
</script>
```
